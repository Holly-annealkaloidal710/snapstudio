<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" fill="none">
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="340" rx="12" fill="url(#fbg)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Feature 1: AI Generation -->
  <g transform="translate(30, 25)">
    <rect width="220" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="40" cy="35" r="20" fill="#eff6ff"/>
    <text x="40" y="40" text-anchor="middle" font-size="18">&#x1F3A8;</text>
    <text x="70" y="35" fill="#1e293b" font-family="system-ui" font-size="13" font-weight="700">AI Generation</text>
    <text x="18" y="65" fill="#64748b" font-family="system-ui" font-size="11">4 styles: Display, Model,</text>
    <text x="18" y="82" fill="#64748b" font-family="system-ui" font-size="11">Social, Seeding. Industry-</text>
    <text x="18" y="99" fill="#64748b" font-family="system-ui" font-size="11">specific AI prompts for</text>
    <text x="18" y="116" fill="#64748b" font-family="system-ui" font-size="11">professional results.</text>
  </g>

  <!-- Feature 2: Multi-Industry -->
  <g transform="translate(265, 25)">
    <rect width="220" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="40" cy="35" r="20" fill="#faf5ff"/>
    <text x="40" y="40" text-anchor="middle" font-size="18">&#x1F3ED;</text>
    <text x="70" y="35" fill="#1e293b" font-family="system-ui" font-size="13" font-weight="700">Multi-Industry</text>
    <text x="18" y="65" fill="#64748b" font-family="system-ui" font-size="11">Specialized templates for</text>
    <text x="18" y="82" fill="#64748b" font-family="system-ui" font-size="11">Fashion, Beauty, F&amp;B,</text>
    <text x="18" y="99" fill="#64748b" font-family="system-ui" font-size="11">Mother &amp; Baby, and more.</text>
    <text x="18" y="116" fill="#64748b" font-family="system-ui" font-size="11">60+ optimized prompts.</text>
  </g>

  <!-- Feature 3: Community -->
  <g transform="translate(500, 25)">
    <rect width="220" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="40" cy="35" r="20" fill="#ecfdf5"/>
    <text x="40" y="40" text-anchor="middle" font-size="18">&#x1F465;</text>
    <text x="70" y="35" fill="#1e293b" font-family="system-ui" font-size="13" font-weight="700">Community</text>
    <text x="18" y="65" fill="#64748b" font-family="system-ui" font-size="11">Share images publicly,</text>
    <text x="18" y="82" fill="#64748b" font-family="system-ui" font-size="11">get likes &amp; comments.</text>
    <text x="18" y="99" fill="#64748b" font-family="system-ui" font-size="11">Follow creators and</text>
    <text x="18" y="116" fill="#64748b" font-family="system-ui" font-size="11">build your portfolio.</text>
  </g>

  <!-- Feature 4: Dashboard -->
  <g transform="translate(735, 25)">
    <rect width="230" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="40" cy="35" r="20" fill="#fff7ed"/>
    <text x="40" y="40" text-anchor="middle" font-size="18">&#x1F4CA;</text>
    <text x="70" y="35" fill="#1e293b" font-family="system-ui" font-size="13" font-weight="700">Analytics</text>
    <text x="18" y="65" fill="#64748b" font-family="system-ui" font-size="11">User &amp; admin dashboards</text>
    <text x="18" y="82" fill="#64748b" font-family="system-ui" font-size="11">with real-time analytics,</text>
    <text x="18" y="99" fill="#64748b" font-family="system-ui" font-size="11">project management, and</text>
    <text x="18" y="116" fill="#64748b" font-family="system-ui" font-size="11">usage tracking.</text>
  </g>

  <!-- Feature 5: Points System -->
  <g transform="translate(30, 185)">
    <rect width="220" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="40" cy="35" r="20" fill="#fefce8"/>
    <text x="40" y="40" text-anchor="middle" font-size="18">&#x1F4B0;</text>
    <text x="70" y="35" fill="#1e293b" font-family="system-ui" font-size="13" font-weight="700">Points System</text>
    <text x="18" y="65" fill="#64748b" font-family="system-ui" font-size="11">Credit-based pricing with</text>
    <text x="18" y="82" fill="#64748b" font-family="system-ui" font-size="11">Starter, Pro, Business &amp;</text>
    <text x="18" y="99" fill="#64748b" font-family="system-ui" font-size="11">Enterprise tiers. Monthly</text>
    <text x="18" y="116" fill="#64748b" font-family="system-ui" font-size="11">&amp; yearly billing.</text>
  </g>

  <!-- Feature 6: Payments -->
  <g transform="translate(265, 185)">
    <rect width="220" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="40" cy="35" r="20" fill="#fdf2f8"/>
    <text x="40" y="40" text-anchor="middle" font-size="18">&#x1F4B3;</text>
    <text x="70" y="35" fill="#1e293b" font-family="system-ui" font-size="13" font-weight="700">VN Payments</text>
    <text x="18" y="65" fill="#64748b" font-family="system-ui" font-size="11">Bank transfer with QR</text>
    <text x="18" y="82" fill="#64748b" font-family="system-ui" font-size="11">code via SePay. Auto</text>
    <text x="18" y="99" fill="#64748b" font-family="system-ui" font-size="11">webhook confirmation</text>
    <text x="18" y="116" fill="#64748b" font-family="system-ui" font-size="11">and order tracking.</text>
  </g>

  <!-- Feature 7: Affiliate -->
  <g transform="translate(500, 185)">
    <rect width="220" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="40" cy="35" r="20" fill="#f0fdf4"/>
    <text x="40" y="40" text-anchor="middle" font-size="18">&#x1F91D;</text>
    <text x="70" y="35" fill="#1e293b" font-family="system-ui" font-size="13" font-weight="700">Affiliate Program</text>
    <text x="18" y="65" fill="#64748b" font-family="system-ui" font-size="11">Referral codes, commission</text>
    <text x="18" y="82" fill="#64748b" font-family="system-ui" font-size="11">tracking, and automated</text>
    <text x="18" y="99" fill="#64748b" font-family="system-ui" font-size="11">payout management for</text>
    <text x="18" y="116" fill="#64748b" font-family="system-ui" font-size="11">content creators.</text>
  </g>

  <!-- Feature 8: Admin -->
  <g transform="translate(735, 185)">
    <rect width="230" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="40" cy="35" r="20" fill="#fef2f2"/>
    <text x="40" y="40" text-anchor="middle" font-size="18">&#x1F6E1;</text>
    <text x="70" y="35" fill="#1e293b" font-family="system-ui" font-size="13" font-weight="700">Admin Panel</text>
    <text x="18" y="65" fill="#64748b" font-family="system-ui" font-size="11">User management, content</text>
    <text x="18" y="82" fill="#64748b" font-family="system-ui" font-size="11">moderation, order tracking,</text>
    <text x="18" y="99" fill="#64748b" font-family="system-ui" font-size="11">system health, and</text>
    <text x="18" y="116" fill="#64748b" font-family="system-ui" font-size="11">profitability reports.</text>
  </g>
</svg>
