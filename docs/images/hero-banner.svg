<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="12" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="40" x2="1200" y2="40" stroke="white" stroke-width="1"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="white" stroke-width="1"/>
  </g>

  <!-- Left side: Single image -->
  <g transform="translate(80, 80)">
    <!-- Source image card -->
    <rect width="180" height="240" rx="12" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <rect x="15" y="15" width="150" height="150" rx="8" fill="#334155"/>
    <!-- Image icon -->
    <circle cx="90" cy="75" r="20" fill="#475569"/>
    <path d="M65 110 L80 90 L95 105 L105 95 L120 110 Z" fill="#475569"/>
    <!-- Label -->
    <text x="90" y="195" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="13" font-weight="500">Source Image</text>
    <text x="90" y="220" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="11">1 product photo</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(310, 175)">
    <rect x="0" y="10" width="100" height="30" rx="15" fill="url(#accent)" opacity="0.15"/>
    <text x="50" y="31" text-anchor="middle" fill="url(#accent)" font-family="system-ui" font-size="14" font-weight="700">AI</text>
    <path d="M110 25 L140 25" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <path d="M135 18 L143 25 L135 32" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Right side: 12 generated images grid -->
  <g transform="translate(480, 55)">
    <!-- Row 1 - Display -->
    <rect x="0" y="0" width="105" height="70" rx="6" fill="#1e3a5f" stroke="#2563eb" stroke-width="1.5" opacity="0.9"/>
    <text x="52" y="38" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="10" font-weight="600">Display</text>
    <text x="52" y="52" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="8" opacity="0.7">Hero Shot</text>

    <rect x="115" y="0" width="105" height="70" rx="6" fill="#1e3a5f" stroke="#2563eb" stroke-width="1.5" opacity="0.9"/>
    <text x="167" y="38" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="10" font-weight="600">Display</text>
    <text x="167" y="52" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="8" opacity="0.7">Luxury</text>

    <rect x="230" y="0" width="105" height="70" rx="6" fill="#1e3a5f" stroke="#2563eb" stroke-width="1.5" opacity="0.9"/>
    <text x="282" y="38" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="10" font-weight="600">Display</text>
    <text x="282" y="52" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="8" opacity="0.7">Macro</text>

    <!-- Row 2 - Model -->
    <rect x="0" y="80" width="105" height="70" rx="6" fill="#2d1f3d" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
    <text x="52" y="118" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="10" font-weight="600">Model</text>
    <text x="52" y="132" text-anchor="middle" fill="#7c3aed" font-family="system-ui" font-size="8" opacity="0.7">Lifestyle</text>

    <rect x="115" y="80" width="105" height="70" rx="6" fill="#2d1f3d" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
    <text x="167" y="118" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="10" font-weight="600">Model</text>
    <text x="167" y="132" text-anchor="middle" fill="#7c3aed" font-family="system-ui" font-size="8" opacity="0.7">Hands</text>

    <rect x="230" y="80" width="105" height="70" rx="6" fill="#2d1f3d" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
    <text x="282" y="118" text-anchor="middle" fill="#a78bfa" font-family="system-ui" font-size="10" font-weight="600">Model</text>
    <text x="282" y="132" text-anchor="middle" fill="#7c3aed" font-family="system-ui" font-size="8" opacity="0.7">Scene</text>

    <!-- Row 3 - Social -->
    <rect x="0" y="160" width="105" height="70" rx="6" fill="#1a332e" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
    <text x="52" y="198" text-anchor="middle" fill="#6ee7b7" font-family="system-ui" font-size="10" font-weight="600">Social</text>
    <text x="52" y="212" text-anchor="middle" fill="#10b981" font-family="system-ui" font-size="8" opacity="0.7">Instagram</text>

    <rect x="115" y="160" width="105" height="70" rx="6" fill="#1a332e" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
    <text x="167" y="198" text-anchor="middle" fill="#6ee7b7" font-family="system-ui" font-size="10" font-weight="600">Social</text>
    <text x="167" y="212" text-anchor="middle" fill="#10b981" font-family="system-ui" font-size="8" opacity="0.7">Facebook</text>

    <rect x="230" y="160" width="105" height="70" rx="6" fill="#1a332e" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
    <text x="282" y="198" text-anchor="middle" fill="#6ee7b7" font-family="system-ui" font-size="10" font-weight="600">Social</text>
    <text x="282" y="212" text-anchor="middle" fill="#10b981" font-family="system-ui" font-size="8" opacity="0.7">Seasonal</text>

    <!-- Row 4 - Seeding -->
    <rect x="0" y="240" width="105" height="70" rx="6" fill="#332b1a" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <text x="52" y="278" text-anchor="middle" fill="#fcd34d" font-family="system-ui" font-size="10" font-weight="600">Seeding</text>
    <text x="52" y="292" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="8" opacity="0.7">UGC Style</text>

    <rect x="115" y="240" width="105" height="70" rx="6" fill="#332b1a" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <text x="167" y="278" text-anchor="middle" fill="#fcd34d" font-family="system-ui" font-size="10" font-weight="600">Seeding</text>
    <text x="167" y="292" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="8" opacity="0.7">Review</text>

    <rect x="230" y="240" width="105" height="70" rx="6" fill="#332b1a" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <text x="282" y="278" text-anchor="middle" fill="#fcd34d" font-family="system-ui" font-size="10" font-weight="600">Seeding</text>
    <text x="282" y="292" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="8" opacity="0.7">Flat Lay</text>
  </g>

  <!-- Title overlay -->
  <g transform="translate(870, 100)">
    <text x="0" y="0" fill="white" font-family="system-ui" font-size="36" font-weight="800">Snap</text>
    <text x="90" y="0" fill="url(#accent)" font-family="system-ui" font-size="36" font-weight="800">Studio</text>
    <text x="0" y="35" fill="#94a3b8" font-family="system-ui" font-size="15" font-weight="400">AI Product Image Generator</text>
    <line x1="0" y1="55" x2="250" y2="55" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
    <text x="0" y="85" fill="#64748b" font-family="system-ui" font-size="13">1 photo</text>
    <text x="65" y="85" fill="url(#accent)" font-family="system-ui" font-size="13" font-weight="700">&#8594;</text>
    <text x="85" y="85" fill="#e2e8f0" font-family="system-ui" font-size="13" font-weight="600">12 marketing images</text>
    <text x="0" y="110" fill="#64748b" font-family="system-ui" font-size="13">30 seconds</text>
    <text x="90" y="110" fill="#64748b" font-family="system-ui" font-size="13">&#8226;</text>
    <text x="105" y="110" fill="#64748b" font-family="system-ui" font-size="13">4 styles</text>
    <text x="165" y="110" fill="#64748b" font-family="system-ui" font-size="13">&#8226;</text>
    <text x="180" y="110" fill="#64748b" font-family="system-ui" font-size="13">5+ industries</text>
  </g>

  <!-- Tech badges -->
  <g transform="translate(870, 260)">
    <rect x="0" y="0" width="72" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="36" y="16" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10" font-weight="500">Next.js 15</text>

    <rect x="82" y="0" width="72" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="118" y="16" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10" font-weight="500">Supabase</text>

    <rect x="164" y="0" width="82" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="205" y="16" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10" font-weight="500">Tailwind CSS</text>

    <rect x="0" y="32" width="82" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="41" y="48" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10" font-weight="500">TypeScript</text>

    <rect x="92" y="32" width="72" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="128" y="48" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10" font-weight="500">Shadcn/UI</text>
  </g>
</svg>
